<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Admin — MyStore</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div id="navbar-slot"></div>

  <main class="container" style="padding-top: 2rem;">
    <h1>Admin</h1>
    <p class="section-subtitle" style="text-align:left; margin-bottom:1.5rem;">
      Manage products, orders, and categories.
    </p>

    <div class="admin-tabs" role="tablist">
      <button class="admin-tab active" data-tab="products" role="tab">Products</button>
      <button class="admin-tab" data-tab="orders" role="tab">Orders</button>
      <button class="admin-tab" data-tab="categories" role="tab">Categories</button>
    </div>

    <section id="tab-products" class="admin-tab-panel active">
      <div class="admin-toolbar">
        <h2>Products</h2>
        <button class="btn btn-primary" id="btn-add-product">+ Add product</button>
      </div>
      <div id="products-table-wrap"><div class="spinner"></div></div>
    </section>

    <section id="tab-orders" class="admin-tab-panel">
      <div class="admin-toolbar"><h2>Orders</h2></div>
      <div id="orders-table-wrap"><div class="spinner"></div></div>
    </section>

    <section id="tab-categories" class="admin-tab-panel">
      <div class="admin-toolbar">
        <h2>Categories</h2>
        <button class="btn btn-primary" id="btn-add-category">+ Add category</button>
      </div>
      <div id="categories-table-wrap"><div class="spinner"></div></div>
    </section>
  </main>

  <!-- Modal: product -->
  <div class="modal-backdrop" id="product-modal" hidden>
    <div class="modal">
      <div class="modal-head">
        <h2 id="product-modal-title">Add product</h2>
        <button class="modal-close" data-close-modal aria-label="Close">×</button>
      </div>
      <form id="product-form">
        <input type="hidden" name="id" />
        <label>Name</label>
        <input name="name" required maxlength="150" />
        <label>Description</label>
        <textarea name="description" rows="3"></textarea>
        <div class="form-row">
          <div>
            <label>Price ($)</label>
            <input name="price" type="number" step="0.01" min="0" required />
          </div>
          <div>
            <label>Stock</label>
            <input name="stock" type="number" min="0" required />
          </div>
        </div>
        <div class="form-row">
          <div>
            <label>Category</label>
            <select name="categoryId" id="product-category" required></select>
          </div>
          <div>
            <label>Brand</label>
            <input name="brand" maxlength="60" />
          </div>
        </div>
        <label>Product Image</label>
        <input type="file" name="image" id="product-image" accept="image/*" />
        <label class="checkbox-label">
          <input type="checkbox" name="isFeatured" /> Show in Featured section
        </label>
        <div class="form-error" id="product-form-error"></div>
        <div class="modal-actions">
          <button type="button" class="btn btn-outline" data-close-modal>Cancel</button>
          <button type="submit" class="btn btn-primary" id="product-submit">Save</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Modal: category -->
  <div class="modal-backdrop" id="category-modal" hidden>
    <div class="modal">
      <div class="modal-head">
        <h2 id="category-modal-title">Add category</h2>
        <button class="modal-close" data-close-modal aria-label="Close">×</button>
      </div>
      <form id="category-form">
        <input type="hidden" name="id" />
        <label>Name</label>
        <input name="name" required maxlength="80" />
        <label>Slug</label>
        <input name="slug" required maxlength="80" pattern="[a-z0-9-]+" placeholder="iphone-pro" />
        <label>Description</label>
        <textarea name="description" rows="2"></textarea>
        <div class="form-error" id="category-form-error"></div>
        <div class="modal-actions">
          <button type="button" class="btn btn-outline" data-close-modal>Cancel</button>
          <button type="submit" class="btn btn-primary" id="category-submit">Save</button>
        </div>
      </form>
    </div>
  </div>

  <div id="footer-slot"></div>

  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/local-cart.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/pages/admin.js"></script>
</body>
</html>
